apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert -f compose.yaml
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: coredns
  name: coredns
spec:
  ports:
    - name: "1053"
      port: 1053
      targetPort: 53
    - name: 1053-udp
      port: 1053
      protocol: UDP
      targetPort: 53
    - name: "8080"
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: coredns
